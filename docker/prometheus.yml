          - entrypoint-discoverer:8080
          - instrumenter:8080
          - trace-runner:8080
          - trace-normalizer:8080
          - spec-generator:8080
          - perf-tracker:8080
          - dual-retriever:8087
          - subgraph-expander:8088
          - serializer:8089
          - api-gateway:8090
          - go-instrumenter:8098
          - go-trace-runner:8099
          - zoekt-indexer:8102
          - lsp-indexer:8101
