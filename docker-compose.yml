networks:
  tersecontext:
    driver: bridge

volumes:
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/prometheus
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/grafana
  neo4j_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/neo4j
  qdrant_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/qdrant
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/redis
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/postgres
  ollama_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/ollama

services:
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-localpassword}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - ./docker/neo4j-init.cypher:/startup/neo4j-init.cypher:ro
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - tersecontext
    healthcheck:
      disable: true

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tersecontext
      POSTGRES_USER: tersecontext
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tersecontext"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama
    ports:
      - "127.0.0.1:11435:11434"  # host Ollama already owns 11434; reach this one at :11435
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - tersecontext

  query-understander:
    build: ./services/query-understander
    ports:
      - "8086:8080"
    environment:
      REDIS_URL: redis://redis:6379
      LLM_BASE_URL: http://ollama:11434
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  embedder:
    build: ./services/embedder
    ports:
      - "8083:8080"
    environment:
      REDIS_URL: redis://redis:6379
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localpassword}
      EMBEDDING_PROVIDER: ollama
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: nomic-embed-text
      EMBEDDING_DIM: "768"
      BATCH_SIZE: "64"
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  vector-writer:
    build: ./services/vector-writer
    ports:
      - "8085:8080"
    environment:
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_DIM: "768"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      embedder:
        condition: service_healthy
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  parser:
    build: ./services/parser
    environment:
      REDIS_URL: redis://redis:6379
      REPO_ROOT: /repos
    volumes:
      - ${REPOS_DIR:-~/.tersecontext/repos}:/repos:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  graph-writer:
    build: ./services/graph-writer
    ports:
      - "8084:8080"
    environment:
      REDIS_URL: redis://redis:6379
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localpassword}
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  graph-enricher:
    build:
      context: ./services
      dockerfile: graph-enricher/Dockerfile
    ports:
      - "8096:8080"
    environment:
      REDIS_URL: redis://redis:6379
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localpassword}
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  symbol-resolver:
    build: ./services/symbol-resolver
    ports:
      - "8082:8080"
    environment:
      REDIS_URL: redis://redis:6379
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localpassword}
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  repo-watcher:
    build: ./services/repo-watcher
    ports:
      - "8091:8080"
    environment:
      REDIS_URL: redis://redis:6379
      REPO_ROOT: /repos
      WATCH_MODE: hook
      POLL_INTERVAL_SECONDS: "30"
      # Hook scripts installed by /install-hook use this URL to call back to the watcher.
      # localhost:8091 works when hooks run on the host machine (default).
      # If your repo is inside a Docker container or devcontainer, use host.docker.internal:8091
      # (Mac/Windows) or your host's docker bridge IP (Linux).
      WATCHER_URL: http://localhost:8091
      ALLOWED_REPO_ROOTS: /repos
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: "*"
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localpassword}
    volumes:
      - ${REPOS_DIR:-~/.tersecontext/repos}:/repos:ro
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  entrypoint-discoverer:
    build:
      context: ./services
      dockerfile: entrypoint-discoverer/Dockerfile
    ports:
      - "8092:8080"
    environment:
      REDIS_URL: redis://redis:6379
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localpassword}
      POSTGRES_DSN: postgres://tersecontext:${POSTGRES_PASSWORD:-localpassword}@postgres:5432/tersecontext
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  instrumenter:
    build:
      context: ./services
      dockerfile: instrumenter/Dockerfile
    ports:
      - "8093:8080"
    environment:
      TIMEOUT_MS: "30000"
      TEMPDIR_PREFIX: "/tmp/tc"
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  trace-runner:
    build:
      context: ./services
      dockerfile: trace-runner/Dockerfile
    ports:
      - "8094:8080"
    volumes:
      - ${REPOS_DIR:-~/.tersecontext/repos}:/repos:ro
    environment:
      REDIS_URL: redis://redis:6379
      INSTRUMENTER_URL: http://instrumenter:8080
      GO_INSTRUMENTER_URL: http://go-instrumenter:8098
      GO_TRACE_RUNNER_URL: http://go-trace-runner:8099
      COMMIT_SHA: unknown
    depends_on:
      redis:
        condition: service_healthy
      instrumenter:
        condition: service_healthy
      go-instrumenter:
        condition: service_healthy
      go-trace-runner:
        condition: service_started
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dual-retriever:
    build: ./services/dual-retriever
    ports:
      - "8087:8087"
    environment:
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localpassword}
      QDRANT_URL: http://qdrant:6333
      EMBEDDER_URL: http://embedder:8080
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
      embedder:
        condition: service_healthy
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  subgraph-expander:
    build: ./services/subgraph-expander
    ports:
      - "8088:8088"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localpassword}
      POSTGRES_DSN: postgres://tersecontext:${POSTGRES_PASSWORD:-localpassword}@postgres:5432/tersecontext
      GRPC_PORT: "8088"
      EXPANDER_HOP_DEPTH: "2"
      EXPANDER_DECAY: "0.7"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8089/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  serializer:
    build: ./services/serializer
    ports:
      - "8089:8089"
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      UNDERSTANDER_URL: http://query-understander:8080
      RETRIEVER_ADDR: dual-retriever:8087
      EXPANDER_ADDR: subgraph-expander:8088
      SERIALIZER_ADDR: serializer:8089
      REDIS_URL: redis://redis:6379
    depends_on:
      query-understander:
        condition: service_healthy
      dual-retriever:
        condition: service_healthy
      subgraph-expander:
        condition: service_healthy
      serializer:
        condition: service_healthy
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  go-instrumenter:
    build: ./services/go-instrumenter
    ports:
      - "8098:8098"
    volumes:
      - ${REPOS_DIR:-~/.tersecontext/repos}:/repos:ro
      - /tmp/go-trace-sessions:/tmp/sessions
      - ./services/tracert:/app/tracert:ro
    environment:
      PORT: "8098"
      SESSIONS_DIR: /tmp/sessions
      TRACERT_PATH: /app/tracert
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8098/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  go-trace-runner:
    build: ./services/go-trace-runner
    ports:
      - "8099:8099"
    volumes:
      - /tmp/go-trace-sessions:/tmp/sessions
    environment:
      PORT: "8099"
      SESSIONS_DIR: /tmp/sessions
      REDIS_URL: redis://redis:6379
      INSTRUMENTER_URL: http://go-instrumenter:8098
    depends_on:
      redis:
        condition: service_healthy
      go-instrumenter:
        condition: service_healthy
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8099/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  trace-normalizer:
    build:
      context: ./services
      dockerfile: trace-normalizer/Dockerfile
    ports:
      - "8095:8080"
    environment:
      REDIS_URL: redis://redis:6379
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-localpassword}
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  spec-generator:
    build:
      context: ./services
      dockerfile: spec-generator/Dockerfile
    ports:
      - "8097:8080"
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_DSN: postgres://tersecontext:${POSTGRES_PASSWORD:-localpassword}@postgres:5432/tersecontext
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_PROVIDER: ollama
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: nomic-embed-text
      EMBEDDING_DIM: "768"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  perf-tracker:
    build: ./services/perf-tracker
    ports:
      - "8100:8080"
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_DSN: postgres://tersecontext:${POSTGRES_PASSWORD:-localpassword}@postgres:5432/tersecontext
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - tersecontext
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - tersecontext

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-localpassword}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - tersecontext

  # One-shot init: waits for Neo4j to be healthy then applies constraints/indexes.
  # Exits 0 on success; docker-compose marks it as exited (not a failure).
  neo4j-init:
    image: neo4j:5
    depends_on:
      neo4j:
        condition: service_healthy
    entrypoint: >
      bash -c "cypher-shell -u neo4j -p $${NEO4J_PASSWORD:-localpassword} -a bolt://neo4j:7687
      < /startup/neo4j-init.cypher && echo 'neo4j-init: done'"
    volumes:
      - ./docker/neo4j-init.cypher:/startup/neo4j-init.cypher:ro
    networks:
      - tersecontext
    restart: "no"
