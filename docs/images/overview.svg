<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <linearGradient id="static-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#162d4a"/>
    </linearGradient>
    <linearGradient id="stores-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1e2e"/>
      <stop offset="100%" style="stop-color:#141720"/>
    </linearGradient>
    <linearGradient id="dynamic-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1e4a"/>
      <stop offset="100%" style="stop-color:#221638"/>
    </linearGradient>
    <linearGradient id="output-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3d2a"/>
      <stop offset="100%" style="stop-color:#162d1f"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#4a9eff"/>
    </marker>
    <marker id="arr-purple" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#a855f7"/>
    </marker>
    <marker id="arr-green" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#4ade80"/>
    </marker>
    <marker id="arr-dim" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#334"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" fill="#ffffff" font-size="21" font-weight="700" letter-spacing="1">TerseContext</text>
  <text x="450" y="52" text-anchor="middle" fill="#8899aa" font-size="11.5">minimum sufficient LLM context from your codebase</text>

  <!-- ══════════════════════════════════════════════════════
       LEFT COLUMN  x=24..404
       ══════════════════════════════════════════════════════ -->

  <!-- ── STATIC ANALYSIS LANE ── -->
  <rect x="24" y="64" width="380" height="120" rx="8" fill="url(#static-grad)" stroke="#2a5080" stroke-width="1"/>
  <text x="44" y="82" fill="#4a9eff" font-size="10.5" font-weight="600" letter-spacing="1.5">STATIC ANALYSIS</text>

  <!-- repo input -->
  <text x="26" y="107" fill="#3a6080" font-size="9">your</text>
  <text x="26" y="119" fill="#3a6080" font-size="9">repo</text>
  <line x1="50" y1="113" x2="64" y2="113" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- parser -->
  <rect x="64" y="94" width="78" height="38" rx="5" fill="#1a3a5c" stroke="#3a7abf" stroke-width="1"/>
  <text x="103" y="110" text-anchor="middle" fill="#7ec8ff" font-size="9.5" font-weight="600">parser</text>
  <text x="103" y="124" text-anchor="middle" fill="#5a8ab0" font-size="8.5">AST → nodes</text>
  <line x1="142" y1="113" x2="156" y2="113" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- embedder -->
  <rect x="156" y="94" width="78" height="38" rx="5" fill="#1a3a5c" stroke="#3a7abf" stroke-width="1"/>
  <text x="195" y="110" text-anchor="middle" fill="#7ec8ff" font-size="9.5" font-weight="600">embedder</text>
  <text x="195" y="124" text-anchor="middle" fill="#5a8ab0" font-size="8.5">nodes → vectors</text>
  <line x1="234" y1="113" x2="248" y2="113" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- graph-builder -->
  <rect x="248" y="94" width="84" height="38" rx="5" fill="#1a3a5c" stroke="#3a7abf" stroke-width="1"/>
  <text x="290" y="110" text-anchor="middle" fill="#7ec8ff" font-size="9.5" font-weight="600">graph-builder</text>
  <text x="290" y="124" text-anchor="middle" fill="#5a8ab0" font-size="8.5">edges + calls</text>

  <!-- symbol-resolver (below) -->
  <rect x="248" y="140" width="84" height="28" rx="5" fill="#12263a" stroke="#2a5870" stroke-width="1"/>
  <text x="290" y="158" text-anchor="middle" fill="#4a7a9a" font-size="8.5">symbol-resolver</text>

  <!-- static caption -->
  <text x="214" y="175" text-anchor="middle" fill="#2a5070" font-size="8.5">what code exists · who calls what · semantic meaning</text>

  <!-- ── SHARED STORES BAND ── -->
  <rect x="24" y="196" width="380" height="102" rx="8" fill="url(#stores-grad)" stroke="#252840" stroke-width="1"/>
  <text x="44" y="212" fill="#556688" font-size="10" font-weight="600" letter-spacing="1.5">SHARED STORES</text>

  <!-- Legend -->
  <rect x="288" y="202" width="8" height="8" rx="2" fill="#1a3a5c" stroke="#3a7abf" stroke-width="1"/>
  <text x="300" y="210" fill="#4a9eff" font-size="8">static</text>
  <rect x="330" y="202" width="8" height="8" rx="2" fill="#2a1a40" stroke="#7a3abf" stroke-width="1"/>
  <text x="342" y="210" fill="#a855f7" font-size="8">dynamic</text>

  <!-- Neo4j -->
  <rect x="36" y="218" width="80" height="68" rx="6" fill="#0e1820" stroke="#2a4060" stroke-width="1"/>
  <text x="76" y="232" text-anchor="middle" fill="#7ab8d8" font-size="9.5" font-weight="700">Neo4j</text>
  <line x1="44" y1="237" x2="108" y2="237" stroke="#1a3050" stroke-width="0.5"/>
  <text x="76" y="250" text-anchor="middle" fill="#4a9eff" font-size="8">S: nodes · CALLS</text>
  <text x="76" y="261" text-anchor="middle" fill="#4a9eff" font-size="8">   IMPORTS edges</text>
  <text x="76" y="274" text-anchor="middle" fill="#a855f7" font-size="8">D: runtime edges</text>
  <text x="76" y="285" text-anchor="middle" fill="#a855f7" font-size="8">   confirmed/conflict</text>

  <!-- Qdrant -->
  <rect x="126" y="218" width="80" height="68" rx="6" fill="#0e1820" stroke="#2a4060" stroke-width="1"/>
  <text x="166" y="232" text-anchor="middle" fill="#7ab8d8" font-size="9.5" font-weight="700">Qdrant</text>
  <line x1="134" y1="237" x2="198" y2="237" stroke="#1a3050" stroke-width="0.5"/>
  <text x="166" y="250" text-anchor="middle" fill="#4a9eff" font-size="8">S: code embeddings</text>
  <text x="166" y="261" text-anchor="middle" fill="#4a9eff" font-size="8">   (nodes collection)</text>
  <text x="166" y="274" text-anchor="middle" fill="#a855f7" font-size="8">D: spec embeddings</text>
  <text x="166" y="285" text-anchor="middle" fill="#a855f7" font-size="8">   (specs collection)</text>

  <!-- Postgres -->
  <rect x="216" y="218" width="80" height="68" rx="6" fill="#0e1820" stroke="#2a4060" stroke-width="1"/>
  <text x="256" y="232" text-anchor="middle" fill="#7ab8d8" font-size="9.5" font-weight="700">Postgres</text>
  <line x1="224" y1="237" x2="288" y2="237" stroke="#1a3050" stroke-width="0.5"/>
  <text x="256" y="250" text-anchor="middle" fill="#334466" font-size="8">S: —</text>
  <text x="256" y="274" text-anchor="middle" fill="#a855f7" font-size="8">D: behavior_specs</text>
  <text x="256" y="285" text-anchor="middle" fill="#a855f7" font-size="8">   versioned · queryable</text>

  <!-- Redis -->
  <rect x="306" y="218" width="84" height="68" rx="6" fill="#0e1820" stroke="#2a4060" stroke-width="1"/>
  <text x="348" y="232" text-anchor="middle" fill="#7ab8d8" font-size="9.5" font-weight="700">Redis</text>
  <line x1="314" y1="237" x2="382" y2="237" stroke="#1a3050" stroke-width="0.5"/>
  <text x="348" y="250" text-anchor="middle" fill="#4a9eff" font-size="8">S: event streams</text>
  <text x="348" y="261" text-anchor="middle" fill="#4a9eff" font-size="8">   (parsed / embedded)</text>
  <text x="348" y="274" text-anchor="middle" fill="#a855f7" font-size="8">D: job queues</text>
  <text x="348" y="285" text-anchor="middle" fill="#a855f7" font-size="8">   + trace streams</text>

  <!-- Connector lines: static lane → stores -->
  <line x1="103" y1="132" x2="76" y2="218" stroke="#2a5878" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="195" y1="132" x2="166" y2="218" stroke="#2a5878" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="290" y1="132" x2="280" y2="218" stroke="#2a5878" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="310" y1="132" x2="330" y2="218" stroke="#2a5878" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ── DYNAMIC ANALYSIS LANE ── -->
  <rect x="24" y="308" width="380" height="260" rx="8" fill="url(#dynamic-grad)" stroke="#5a2a80" stroke-width="1"/>
  <text x="44" y="326" fill="#a855f7" font-size="10.5" font-weight="600" letter-spacing="1.5">DYNAMIC ANALYSIS</text>

  <!-- Row 1 -->
  <rect x="36" y="334" width="86" height="40" rx="5" fill="#2a1a40" stroke="#7a3abf" stroke-width="1"/>
  <text x="79" y="351" text-anchor="middle" fill="#c084fc" font-size="8.5" font-weight="600">entrypoint</text>
  <text x="79" y="363" text-anchor="middle" fill="#c084fc" font-size="8.5" font-weight="600">discoverer</text>
  <line x1="122" y1="354" x2="136" y2="354" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <rect x="136" y="334" width="78" height="40" rx="5" fill="#2a1a40" stroke="#7a3abf" stroke-width="1"/>
  <text x="175" y="351" text-anchor="middle" fill="#c084fc" font-size="8.5" font-weight="600">instrumenter</text>
  <text x="175" y="363" text-anchor="middle" fill="#7a5a9a" font-size="8">patch I/O</text>
  <line x1="214" y1="354" x2="228" y2="354" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <rect x="228" y="334" width="80" height="40" rx="5" fill="#2a1a40" stroke="#7a3abf" stroke-width="1"/>
  <text x="268" y="351" text-anchor="middle" fill="#c084fc" font-size="8.5" font-weight="600">trace-runner</text>
  <text x="268" y="363" text-anchor="middle" fill="#7a5a9a" font-size="8">execute + record</text>

  <!-- Row 2 -->
  <line x1="268" y1="374" x2="268" y2="390" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="268" y1="390" x2="175" y2="390" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="175" y1="390" x2="175" y2="396" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <rect x="136" y="396" width="78" height="40" rx="5" fill="#2a1a40" stroke="#7a3abf" stroke-width="1"/>
  <text x="175" y="413" text-anchor="middle" fill="#c084fc" font-size="8.5" font-weight="600">trace</text>
  <text x="175" y="425" text-anchor="middle" fill="#c084fc" font-size="8.5" font-weight="600">normalizer</text>

  <line x1="214" y1="416" x2="228" y2="402" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="214" y1="416" x2="228" y2="432" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <rect x="228" y="392" width="86" height="30" rx="5" fill="#2a1a40" stroke="#7a3abf" stroke-width="1"/>
  <text x="271" y="405" text-anchor="middle" fill="#c084fc" font-size="8.5" font-weight="600">graph-enricher</text>
  <text x="271" y="416" text-anchor="middle" fill="#7a5a9a" font-size="8">→ Neo4j</text>

  <rect x="228" y="428" width="86" height="30" rx="5" fill="#2a1a40" stroke="#7a3abf" stroke-width="1"/>
  <text x="271" y="441" text-anchor="middle" fill="#c084fc" font-size="8.5" font-weight="600">spec-generator</text>
  <text x="271" y="452" text-anchor="middle" fill="#7a5a9a" font-size="8">→ Postgres · Qdrant</text>

  <!-- Connector lines: stores → dynamic lane -->
  <line x1="76" y1="286" x2="76" y2="380" stroke="#5a2a78" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="76" y1="380" x2="60" y2="308" stroke="#5a2a78" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="256" y1="286" x2="256" y2="308" stroke="#5a2a78" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="348" y1="286" x2="348" y2="360" stroke="#5a2a78" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="348" y1="360" x2="323" y2="334" stroke="#5a2a78" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="214" y="498" text-anchor="middle" fill="#5a3a7a" font-size="8.5">what actually runs · hidden calls · side effects · branch paths</text>

  <!-- ══════════════════════════════════════════════════════
       RIGHT COLUMN
       ══════════════════════════════════════════════════════ -->

  <!-- ── CONTEXT OUTPUT ── -->
  <rect x="424" y="64" width="228" height="500" rx="8" fill="url(#output-grad)" stroke="#2a6040" stroke-width="1"/>
  <text x="444" y="82" fill="#4ade80" font-size="10.5" font-weight="600" letter-spacing="1.5">CONTEXT OUTPUT</text>

  <rect x="438" y="92" width="200" height="26" rx="5" fill="#1a3a26" stroke="#3a8050" stroke-width="1"/>
  <text x="538" y="109" text-anchor="middle" fill="#86efac" font-size="9.5">L1 · Repo manifest</text>

  <rect x="438" y="124" width="200" height="26" rx="5" fill="#1a3a26" stroke="#3a8050" stroke-width="1"/>
  <text x="538" y="141" text-anchor="middle" fill="#86efac" font-size="9.5">L2 · Changed files</text>

  <rect x="438" y="156" width="200" height="26" rx="5" fill="#1a3a26" stroke="#3a8050" stroke-width="1"/>
  <text x="538" y="173" text-anchor="middle" fill="#86efac" font-size="9.5">L3 · Call graph slice</text>

  <rect x="438" y="188" width="200" height="26" rx="5" fill="#1a3a26" stroke="#3a8050" stroke-width="1"/>
  <text x="538" y="205" text-anchor="middle" fill="#86efac" font-size="9.5">L4 · Semantic neighbours</text>

  <rect x="438" y="220" width="200" height="26" rx="5" fill="#1c402a" stroke="#4a9060" stroke-width="1.5"/>
  <text x="538" y="237" text-anchor="middle" fill="#a0ffb8" font-size="9.5" font-weight="600">L5 · Execution paths ✦</text>

  <rect x="438" y="252" width="200" height="26" rx="5" fill="#1c402a" stroke="#4a9060" stroke-width="1.5"/>
  <text x="538" y="269" text-anchor="middle" fill="#a0ffb8" font-size="9.5" font-weight="600">L6 · Behavior specs ✦</text>

  <text x="538" y="300" text-anchor="middle" fill="#3a6848" font-size="8">✦ from dynamic analysis</text>

  <rect x="460" y="316" width="156" height="50" rx="8" fill="#0f1f17" stroke="#2a5038" stroke-width="1.5"/>
  <text x="538" y="337" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">LLM</text>
  <text x="538" y="353" text-anchor="middle" fill="#3a6848" font-size="8.5">precise · minimal · grounded</text>
  <line x1="538" y1="278" x2="538" y2="315" stroke="#4ade80" stroke-width="2" marker-end="url(#arr-green)"/>

  <text x="538" y="394" text-anchor="middle" fill="#3a6848" font-size="8.5" letter-spacing="0.5">TOKEN BUDGET</text>
  <rect x="454" y="400" width="168" height="7" rx="3" fill="#0d1f14" stroke="#2a5038" stroke-width="1"/>
  <rect x="454" y="400" width="60" height="7" rx="3" fill="#4ade80"/>
  <text x="538" y="422" text-anchor="middle" fill="#2a5030" font-size="8">only what the task needs</text>

  <!-- connecting arrows: pipelines → context output -->
  <line x1="404" y1="175" x2="422" y2="175" stroke="#4a9eff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-blue)"/>
  <line x1="404" y1="430" x2="414" y2="430" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="414" y1="430" x2="414" y2="256" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="414" y1="256" x2="422" y2="256" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-purple)"/>

  <!-- ── QUERY API ── -->
  <rect x="668" y="64" width="208" height="500" rx="8" fill="#131520" stroke="#2a2d40" stroke-width="1"/>
  <text x="688" y="82" fill="#f59e0b" font-size="10.5" font-weight="600" letter-spacing="1.5">QUERY API</text>

  <rect x="682" y="92" width="180" height="38" rx="5" fill="#1e1b0e" stroke="#7a5a10" stroke-width="1"/>
  <text x="772" y="108" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">POST /context</text>
  <text x="772" y="122" text-anchor="middle" fill="#6a4a10" font-size="8">{ repo, diff, question }</text>

  <rect x="682" y="138" width="180" height="38" rx="5" fill="#1e1b0e" stroke="#7a5a10" stroke-width="1"/>
  <text x="772" y="154" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">POST /search</text>
  <text x="772" y="168" text-anchor="middle" fill="#6a4a10" font-size="8">semantic code search</text>

  <rect x="682" y="184" width="180" height="38" rx="5" fill="#1e1b0e" stroke="#7a5a10" stroke-width="1"/>
  <text x="772" y="200" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">GET /graph</text>
  <text x="772" y="214" text-anchor="middle" fill="#6a4a10" font-size="8">call graph traversal</text>

  <text x="688" y="248" fill="#7a6a3a" font-size="9" font-weight="600" letter-spacing="1">TRIGGERS</text>
  <rect x="682" y="256" width="82" height="28" rx="5" fill="#1a1608" stroke="#5a4a20" stroke-width="1"/>
  <text x="723" y="274" text-anchor="middle" fill="#d97706" font-size="9">git hook</text>
  <rect x="772" y="256" width="90" height="28" rx="5" fill="#1a1608" stroke="#5a4a20" stroke-width="1"/>
  <text x="817" y="274" text-anchor="middle" fill="#d97706" font-size="9">PR open</text>
  <rect x="682" y="292" width="82" height="28" rx="5" fill="#1a1608" stroke="#5a4a20" stroke-width="1"/>
  <text x="723" y="310" text-anchor="middle" fill="#d97706" font-size="9">schedule</text>
  <rect x="772" y="292" width="90" height="28" rx="5" fill="#1a1608" stroke="#5a4a20" stroke-width="1"/>
  <text x="817" y="310" text-anchor="middle" fill="#d97706" font-size="9">manual</text>

  <text x="772" y="356" text-anchor="middle" fill="#5a4a28" font-size="8.5">drop-in for any LLM tool</text>
  <text x="772" y="370" text-anchor="middle" fill="#5a4a28" font-size="8.5">Claude · Cursor · Copilot · APIs</text>

  <!-- Context → Query -->
  <line x1="652" y1="280" x2="666" y2="280" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-green)"/>

</svg>
