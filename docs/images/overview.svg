<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <linearGradient id="static-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#162d4a"/>
    </linearGradient>
    <linearGradient id="dynamic-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1e4a"/>
      <stop offset="100%" style="stop-color:#221638"/>
    </linearGradient>
    <linearGradient id="output-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3d2a"/>
      <stop offset="100%" style="stop-color:#162d1f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a9eff"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
    <marker id="arrow-white" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700" letter-spacing="1">TerseContext</text>
  <text x="450" y="58" text-anchor="middle" fill="#8899aa" font-size="12">minimum sufficient LLM context from your codebase</text>

  <!-- ── STATIC ANALYSIS LANE ── -->
  <rect x="24" y="78" width="380" height="194" rx="8" fill="url(#static-grad)" stroke="#2a5080" stroke-width="1"/>
  <text x="44" y="98" fill="#4a9eff" font-size="11" font-weight="600" letter-spacing="1.5">STATIC ANALYSIS</text>

  <!-- Service boxes: static -->
  <!-- parser -->
  <rect x="40" y="108" width="80" height="42" rx="6" fill="#1a3a5c" stroke="#3a7abf" stroke-width="1"/>
  <text x="80" y="126" text-anchor="middle" fill="#7ec8ff" font-size="10" font-weight="600">parser</text>
  <text x="80" y="140" text-anchor="middle" fill="#5a8ab0" font-size="9">AST → nodes</text>

  <!-- arrow -->
  <line x1="120" y1="129" x2="148" y2="129" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- embedder -->
  <rect x="148" y="108" width="80" height="42" rx="6" fill="#1a3a5c" stroke="#3a7abf" stroke-width="1"/>
  <text x="188" y="126" text-anchor="middle" fill="#7ec8ff" font-size="10" font-weight="600">embedder</text>
  <text x="188" y="140" text-anchor="middle" fill="#5a8ab0" font-size="9">nodes → vectors</text>

  <!-- arrow -->
  <line x1="228" y1="129" x2="256" y2="129" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- graph-builder -->
  <rect x="256" y="108" width="88" height="42" rx="6" fill="#1a3a5c" stroke="#3a7abf" stroke-width="1"/>
  <text x="300" y="126" text-anchor="middle" fill="#7ec8ff" font-size="10" font-weight="600">graph-builder</text>
  <text x="300" y="140" text-anchor="middle" fill="#5a8ab0" font-size="9">edges + calls</text>

  <!-- Static stores row -->
  <text x="44" y="178" fill="#4a9effaa" font-size="9" font-weight="600" letter-spacing="1">STORES</text>
  <rect x="40" y="186" width="60" height="30" rx="5" fill="#0e2a45" stroke="#2a5878" stroke-width="1"/>
  <text x="70" y="205" text-anchor="middle" fill="#5a9aca" font-size="9">Neo4j</text>

  <rect x="110" y="186" width="60" height="30" rx="5" fill="#0e2a45" stroke="#2a5878" stroke-width="1"/>
  <text x="140" y="205" text-anchor="middle" fill="#5a9aca" font-size="9">Qdrant</text>

  <rect x="180" y="186" width="60" height="30" rx="5" fill="#0e2a45" stroke="#2a5878" stroke-width="1"/>
  <text x="210" y="205" text-anchor="middle" fill="#5a9aca" font-size="9">Postgres</text>

  <rect x="250" y="186" width="60" height="30" rx="5" fill="#0e2a45" stroke="#2a5878" stroke-width="1"/>
  <text x="280" y="205" text-anchor="middle" fill="#5a9aca" font-size="9">Redis</text>

  <!-- dotted lines from graph-builder to stores -->
  <line x1="100" y1="150" x2="70" y2="186" stroke="#2a5878" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="188" y1="150" x2="140" y2="186" stroke="#2a5878" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="260" y1="150" x2="210" y2="186" stroke="#2a5878" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="300" y1="150" x2="280" y2="186" stroke="#2a5878" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- static label bottom -->
  <text x="214" y="252" text-anchor="middle" fill="#3a6080" font-size="9">what code exists · who calls what · semantic meaning</text>

  <!-- ── DYNAMIC ANALYSIS LANE ── -->
  <rect x="24" y="284" width="380" height="214" rx="8" fill="url(#dynamic-grad)" stroke="#5a2a80" stroke-width="1"/>
  <text x="44" y="304" fill="#a855f7" font-size="11" font-weight="600" letter-spacing="1.5">DYNAMIC ANALYSIS</text>

  <!-- 6 service pipeline, two rows -->
  <!-- Row 1: discoverer → instrumenter → trace-runner -->
  <rect x="36" y="312" width="88" height="42" rx="6" fill="#2a1a40" stroke="#7a3abf" stroke-width="1"/>
  <text x="80" y="330" text-anchor="middle" fill="#c084fc" font-size="9" font-weight="600">entrypoint</text>
  <text x="80" y="342" text-anchor="middle" fill="#c084fc" font-size="9" font-weight="600">discoverer</text>

  <line x1="124" y1="333" x2="138" y2="333" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <rect x="138" y="312" width="80" height="42" rx="6" fill="#2a1a40" stroke="#7a3abf" stroke-width="1"/>
  <text x="178" y="330" text-anchor="middle" fill="#c084fc" font-size="9" font-weight="600">instrumenter</text>
  <text x="178" y="342" text-anchor="middle" fill="#7a5a9a" font-size="9">patch I/O</text>

  <line x1="218" y1="333" x2="232" y2="333" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <rect x="232" y="312" width="80" height="42" rx="6" fill="#2a1a40" stroke="#7a3abf" stroke-width="1"/>
  <text x="272" y="330" text-anchor="middle" fill="#c084fc" font-size="9" font-weight="600">trace-runner</text>
  <text x="272" y="342" text-anchor="middle" fill="#7a5a9a" font-size="9">execute + record</text>

  <!-- Row 2: normalizer → graph-enricher + spec-generator -->
  <line x1="272" y1="354" x2="272" y2="368" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="272" y1="368" x2="178" y2="368" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="178" y1="368" x2="178" y2="374" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <rect x="138" y="374" width="80" height="42" rx="6" fill="#2a1a40" stroke="#7a3abf" stroke-width="1"/>
  <text x="178" y="392" text-anchor="middle" fill="#c084fc" font-size="9" font-weight="600">trace</text>
  <text x="178" y="404" text-anchor="middle" fill="#c084fc" font-size="9" font-weight="600">normalizer</text>

  <line x1="218" y1="395" x2="232" y2="380" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="218" y1="395" x2="232" y2="410" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <rect x="232" y="370" width="88" height="32" rx="6" fill="#2a1a40" stroke="#7a3abf" stroke-width="1"/>
  <text x="276" y="384" text-anchor="middle" fill="#c084fc" font-size="9" font-weight="600">graph-enricher</text>
  <text x="276" y="396" text-anchor="middle" fill="#7a5a9a" font-size="9">runtime edges</text>

  <rect x="232" y="408" width="88" height="32" rx="6" fill="#2a1a40" stroke="#7a3abf" stroke-width="1"/>
  <text x="276" y="422" text-anchor="middle" fill="#c084fc" font-size="9" font-weight="600">spec-generator</text>
  <text x="276" y="434" text-anchor="middle" fill="#7a5a9a" font-size="9">behavior specs</text>

  <text x="214" y="476" text-anchor="middle" fill="#5a3a7a" font-size="9">what actually runs · hidden calls · side effects · branch paths</text>

  <!-- ── CONTEXT ASSEMBLER + OUTPUT ── -->
  <rect x="426" y="78" width="224" height="420" rx="8" fill="url(#output-grad)" stroke="#2a6040" stroke-width="1"/>
  <text x="446" y="98" fill="#4ade80" font-size="11" font-weight="600" letter-spacing="1.5">CONTEXT OUTPUT</text>

  <!-- context layers -->
  <rect x="440" y="108" width="196" height="26" rx="5" fill="#1a3a26" stroke="#3a8050" stroke-width="1"/>
  <text x="538" y="125" text-anchor="middle" fill="#86efac" font-size="10">L1 · Repo manifest</text>

  <rect x="440" y="140" width="196" height="26" rx="5" fill="#1a3a26" stroke="#3a8050" stroke-width="1"/>
  <text x="538" y="157" text-anchor="middle" fill="#86efac" font-size="10">L2 · Changed files</text>

  <rect x="440" y="172" width="196" height="26" rx="5" fill="#1a3a26" stroke="#3a8050" stroke-width="1"/>
  <text x="538" y="189" text-anchor="middle" fill="#86efac" font-size="10">L3 · Call graph slice</text>

  <rect x="440" y="204" width="196" height="26" rx="5" fill="#1a3a26" stroke="#3a8050" stroke-width="1"/>
  <text x="538" y="221" text-anchor="middle" fill="#86efac" font-size="10">L4 · Semantic neighbours</text>

  <rect x="440" y="236" width="196" height="26" rx="5" fill="#1c402a" stroke="#4a9060" stroke-width="1.5"/>
  <text x="538" y="253" text-anchor="middle" fill="#a0ffb8" font-size="10" font-weight="600">L5 · Execution paths ✦</text>

  <rect x="440" y="268" width="196" height="26" rx="5" fill="#1c402a" stroke="#4a9060" stroke-width="1.5"/>
  <text x="538" y="285" text-anchor="middle" fill="#a0ffb8" font-size="10" font-weight="600">L6 · Behavior specs ✦</text>

  <text x="538" y="320" text-anchor="middle" fill="#3a6848" font-size="8">✦ from dynamic analysis</text>

  <!-- Output arrow to LLM -->
  <rect x="462" y="338" width="152" height="50" rx="8" fill="#0f1f17" stroke="#2a5038" stroke-width="1.5"/>
  <text x="538" y="358" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">LLM</text>
  <text x="538" y="374" text-anchor="middle" fill="#3a6848" font-size="9">precise · minimal · grounded</text>

  <line x1="538" y1="294" x2="538" y2="337" stroke="#4ade80" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Budget bar -->
  <text x="538" y="418" text-anchor="middle" fill="#3a6848" font-size="9" letter-spacing="0.5">TOKEN BUDGET</text>
  <rect x="456" y="424" width="164" height="8" rx="4" fill="#0d1f14" stroke="#2a5038" stroke-width="1"/>
  <rect x="456" y="424" width="58" height="8" rx="4" fill="#4ade80"/>
  <text x="538" y="448" text-anchor="middle" fill="#3a6848" font-size="8">only what the task needs</text>

  <!-- ── QUERY BOX ── -->
  <rect x="668" y="78" width="208" height="420" rx="8" fill="#131520" stroke="#2a2d40" stroke-width="1"/>
  <text x="688" y="98" fill="#f59e0b" font-size="11" font-weight="600" letter-spacing="1.5">QUERY API</text>

  <rect x="682" y="108" width="180" height="38" rx="6" fill="#1e1b0e" stroke="#7a5a10" stroke-width="1"/>
  <text x="772" y="124" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">POST /context</text>
  <text x="772" y="138" text-anchor="middle" fill="#6a4a10" font-size="8">{ repo, diff, question }</text>

  <rect x="682" y="154" width="180" height="38" rx="6" fill="#1e1b0e" stroke="#7a5a10" stroke-width="1"/>
  <text x="772" y="170" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">POST /search</text>
  <text x="772" y="184" text-anchor="middle" fill="#6a4a10" font-size="8">semantic code search</text>

  <rect x="682" y="200" width="180" height="38" rx="6" fill="#1e1b0e" stroke="#7a5a10" stroke-width="1"/>
  <text x="772" y="216" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">GET /graph</text>
  <text x="772" y="230" text-anchor="middle" fill="#6a4a10" font-size="8">call graph traversal</text>

  <!-- trigger modes -->
  <text x="688" y="264" fill="#7a6a3a" font-size="9" font-weight="600" letter-spacing="1">TRIGGERS</text>
  <rect x="682" y="272" width="82" height="28" rx="5" fill="#1a1608" stroke="#5a4a20" stroke-width="1"/>
  <text x="723" y="290" text-anchor="middle" fill="#d97706" font-size="9">git hook</text>

  <rect x="772" y="272" width="90" height="28" rx="5" fill="#1a1608" stroke="#5a4a20" stroke-width="1"/>
  <text x="817" y="290" text-anchor="middle" fill="#d97706" font-size="9">PR open</text>

  <rect x="682" y="308" width="82" height="28" rx="5" fill="#1a1608" stroke="#5a4a20" stroke-width="1"/>
  <text x="723" y="326" text-anchor="middle" fill="#d97706" font-size="9">schedule</text>

  <rect x="772" y="308" width="90" height="28" rx="5" fill="#1a1608" stroke="#5a4a20" stroke-width="1"/>
  <text x="817" y="326" text-anchor="middle" fill="#d97706" font-size="9">manual</text>

  <!-- integration label -->
  <text x="772" y="368" text-anchor="middle" fill="#5a4a28" font-size="9">drop-in for any LLM tool</text>
  <text x="772" y="382" text-anchor="middle" fill="#5a4a28" font-size="9">Claude · Cursor · Copilot · APIs</text>

  <!-- ── CONNECTING ARROWS between lanes ── -->
  <!-- Static → Context assembler -->
  <line x1="404" y1="200" x2="424" y2="200" stroke="#4a9eff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-blue)"/>

  <!-- Dynamic → Context assembler -->
  <line x1="404" y1="400" x2="418" y2="400" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="418" y1="400" x2="418" y2="270" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="418" y1="270" x2="424" y2="270" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-purple)"/>

  <!-- Context → Query -->
  <line x1="650" y1="290" x2="666" y2="290" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-green)"/>

  <!-- Repo input arrow -->
  <line x1="0" y1="129" x2="38" y2="129" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="2" y="122" fill="#3a6080" font-size="9">your</text>
  <text x="2" y="134" fill="#3a6080" font-size="9">repo</text>

</svg>
